name: Alira Core Actions
description: >
  Composite Action to set up Alira Core environment up to just before running tests,
  excluding any caching steps.

inputs:
  ssh-private-key:
    description: 'SSH private key for cloning the private alira-ai repo'
    required: true

runs:
  using: composite
  steps:
    - name: Load SSH key
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ inputs.ssh-private-key }}

    - name: Clone alira-ai via SSH
      run: git clone git@github.com:SuresoftTechnologies/alira-ai.git target
      shell: bash

    - name: Start Devcontainer
      uses: devcontainers/ci@v0.2
      with:
        installCmd: install-cli
        runCmd: up --workspace-folder target

    - name: Start Core Code Service
      working-directory: target
      run: poe core-server-codes-up
      shell: bash

    - name: Wait for port 8080
      working-directory: target
      run: |
        echo "Waiting up to 60s for port 8080 to be ready…"
        for i in $(seq 1 30); do
          if nc -z localhost 8080; then
            echo "✔ Port 8080 is now reachable"
            exit 0
          fi
          sleep 2
        done
        echo "❌ Port 8080 did not open in time"
        exit 1
      shell: bash

    - name: Checkout repo for diff
      if: ${{ github.event_name == 'pull_request' }}
      uses: actions/checkout@v4
      with:
        token: ${{ github.token }}
        path: pr_repo

    - name: Show PR diff
      if: ${{ github.event_name == 'pull_request' }}
      working-directory: pr_repo
      run: |
        git fetch origin ${{ github.event.pull_request.base.ref }}
        echo "📝 Diff for PR #${{ github.event.pull_request.number }}:"
        git diff origin/${{ github.event.pull_request.base.ref }} HEAD || true
      shell: bash