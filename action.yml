name: Alira Core Actions
description: >
  Composite Action to set up Alira Core environment...

inputs:
  cleanup:
    description: 'Whether to cleanup pr_repo at the end (true/false)'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    # 0. 항상 pr_repo 먼저 삭제 (self-hosted 환경 필수)
    - name: Cleanup pr_repo (always, before start)
      run: rm -rf pr_repo
      shell: bash

    # 1. Checkout
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        token: ${{ github.token }}
        path: pr_repo
        fetch-depth: 0

    # 2. Generate patch file (for PR)
    - name: Generate patch file (for PR)
      if: ${{ github.event_name == 'pull_request' }}
      working-directory: pr_repo
      run: |
        git fetch origin ${{ github.event.pull_request.base.ref }}
        git diff origin/${{ github.event.pull_request.base.ref }} HEAD > /tmp/pr.patch
      shell: bash

    # 3. Generate patch file (for push)
    - name: Generate patch file (for push)
      if: ${{ github.event_name == 'push' }}
      working-directory: pr_repo
      run: |
        git diff ${{ github.event.before }} ${{ github.event.after }} > /tmp/pr.patch
      shell: bash

    # 4. Run Agent (AI Analysis)
    - name: Run Agent (AI Analysis)
      run: |
        uv run --directory /home/sure/alira-ai --package core core/examples/action.py \
          --patch-path /tmp/pr.patch \
          --project-root /home/sure/alira-ai/pr_repo
      shell: bash

    # 5. Cleanup (optional)
    - name: Cleanup pr_repo (if enabled)
      if: ${{ inputs.cleanup == 'true' }}
      run: rm -rf pr_repo
      shell: bash
