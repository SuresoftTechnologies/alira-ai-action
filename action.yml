name: Alira Core Actions
description: >
  Composite Action to set up Alira Core environment up to just before running tests,
  excluding any caching steps.

runs:
  using: composite
  steps:
    - name: Clone alira-ai via SSH
      run: git clone git@github.com:SuresoftTechnologies/alira-ai.git target
      shell: bash

    - name: Checkout repo for diff
      if: ${{ github.event_name == 'pull_request' }}
      uses: actions/checkout@v4
      with:
        token: ${{ github.token }}
        path: pr_repo

    - name: Show PR diff
      if: ${{ github.event_name == 'pull_request' }}
      working-directory: pr_repo
      run: |
        git fetch origin ${{ github.event.pull_request.base.ref }}
        echo "📝 Diff for PR #${{ github.event.pull_request.number }}:"
        git diff origin/${{ github.event.pull_request.base.ref }} HEAD || true
      shell: bash
