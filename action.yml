name: Alira Core Actions
description: >
  Composite Action to set up Alira Core environment and automatically open
  an issue with AI analysis results.

inputs:
  github_token:
    description: 'GitHub token for authentication (e.g. ${{ secrets.GITHUB_TOKEN }})'
    required: true
  cleanup:
    description: 'Whether to cleanup pr_repo at the end (true/false)'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    # 0. 항상 pr_repo 먼저 삭제 (self-hosted 환경 필수)
    - name: Cleanup pr_repo (always)
      run: rm -rf ${{ github.workspace }}/pr_repo
      shell: bash

    # 1. Checkout (workspace 하위에)
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        token: ${{ inputs.github_token }}
        path: pr_repo
        fetch-depth: 0

    # 2. Generate patch file (for PR)
    - name: Generate patch file (for PR)
      if: ${{ github.event_name == 'pull_request' }}
      working-directory: ${{ github.workspace }}/pr_repo
      run: |
        git fetch origin ${{ github.event.pull_request.base.ref }}
        git diff origin/${{ github.event.pull_request.base.ref }} HEAD > /tmp/pr.patch
      shell: bash

    # 3. Generate patch file (for push)
    - name: Generate patch file (for push)
      if: ${{ github.event_name == 'push' }}
      working-directory: ${{ github.workspace }}/pr_repo
      run: |
        git diff ${{ github.event.before }} ${{ github.event.after }} > /tmp/pr.patch
      shell: bash

    # 4. Run Agent (AI Analysis) and save output
    - name: Run Agent (AI Analysis) and save output
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        uv run --directory /home/sure/alira-ai --package core core/examples/action.py \
          --patch-path /tmp/pr.patch \
          --project-root "${{ github.workspace }}/pr_repo" \
          --output-path /tmp/analysis.md
      shell: bash

    # 5. Create GitHub Issue with AI 분석 결과
    - name: Create GitHub Issue
      if: always()
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          TITLE="AI Analysis for PR #${{ github.event.pull_request.number }}"
        else
          TITLE="AI Analysis for commit ${{ github.sha }}"
        fi

        gh issue create \
          --title "$TITLE" \
          --body-file /tmp/analysis.md \
          --repo "${{ github.repository }}"
      shell: bash

    # 6. Cleanup (optional)
    - name: Cleanup pr_repo (if enabled)
      if: ${{ inputs.cleanup == 'true' }}
      run: rm -rf ${{ github.workspace }}/pr_repo
      shell: bash
